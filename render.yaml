services:
  - type: web
    name: participant-chat-lab-api
    runtime: python
    plan: free
    rootDir: backend
    autoDeployTrigger: commit
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-1
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: MOCK_MODE
        value: "false"
