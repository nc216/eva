name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare site artifact
        env:
          PAGES_API_BASE_URL: ${{ vars.PAGES_API_BASE_URL }}
        run: |
          rm -rf ./_site
          mkdir -p ./_site
          cp -R ./site/. ./_site/
          perl -0pi -e 's#__API_BASE_URL__#$ENV{PAGES_API_BASE_URL}#g' ./_site/config.js
          touch ./_site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
